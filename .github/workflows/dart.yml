name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🧹 Re-generate & Patch iOS Project
        run: |
          rm -rf ios
          flutter create --platforms=ios .
          
          # 1. Set Deployment Target
          sed -i '' "s/^# platform :ios.*/platform :ios, '13.0'/" ios/Podfile
          
          # 2. THE BYPASS: Inject No-Sign rules into the project
          # We add a fake Team ID and disable signing requirements in the build config
          echo "DEVELOPMENT_TEAM=ACTION12345" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: 🏗️ Build iOS (Force Bypass)
        # Using 'build ios' with extra manual flags to ensure Xcode ignores signing
        run: |
          flutter build ios --release --no-codesign \
          --extra-front-end-options=--no-implicit-dynamic-tests \
          --split-debug-info=build/symbols

      - name: 🔨 Package Unsigned IPA
        run: |
          mkdir -p Payload
          # Path where Flutter exports the .app bundle
          APP_PATH="build/ios/iphoneos/Runner.app"
          
          if [ -d "$APP_PATH" ]; then
            echo "✅ Runner.app created successfully."
            cp -r "$APP_PATH" Payload/
            zip -r PraiseTheLord_Unsigned.ipa Payload
          else
            echo "❌ Build failed to produce Runner.app"
            exit 1
          fi
          
      - name: 📤 Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: PraiseTheLord_Unsigned.ipa
          asset_name: PraiseTheLord_Unsigned.ipa
          tag: v1.0
          overwrite: true
          body: "Bypassed signing build. This IPA is unsigned and needs a tool like AltStore or TrollStore to install."
