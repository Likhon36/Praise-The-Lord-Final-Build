name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🧹 Clean up
        run: rm -rf ios
        
      - name: 🪄 Generate iOS project & Fix iOS Version
        run: |
          flutter create --platforms=ios .
          # Ensure iOS 13 minimum so plugins compile perfectly
          sed -i '' "s/^# platform :ios.*/platform :ios, '13.0'/" ios/Podfile

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🏗️ Build Dart Code (Bypass Flutter Signing)
        # Flutter prepares the project and compiles Dart, but fails at Xcode signing. We ignore this.
        run: flutter build ios --release --no-codesign || true

      - name: 🔨 Force Xcode to Compile Binary
        # We manually step in and force Xcode to compile the raw executable binary by disabling ALL signing natively
        run: |
          cd ios
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM=""

      - name: 📂 Package Unsigned IPA
        run: |
          echo "Hunting for the generated Runner.app..."
          # Target the specific build folder Xcode uses for physical devices
          APP_PATH=$(find . -name "Runner.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          # Fallback just in case
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "Runner.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app was not found!"
            exit 1
          fi

          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "❌ The app binary is missing! Xcode still blocked the compilation."
            exit 1
          fi
          
          echo "✅ Found a fully compiled Runner.app at: $APP_PATH"
          mkdir -p Payload
          mv "$APP_PATH" Payload/
          
          # Use Apple's native archiver to prevent "Bad file descriptor" errors
          ditto -c -k --keepParent Payload PraiseTheLord.ipa

      - name: 📤 Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: PraiseTheLord.ipa
          asset_name: PraiseTheLord.ipa
          tag: v1.0
          overwrite: true
          body: "Unsigned IPA Build for Praise-The-Lord."
