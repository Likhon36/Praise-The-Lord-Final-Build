name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🧹 Clean up & Re-generate iOS
        run: |
          rm -rf ios
          flutter create --platforms=ios .
          # Ensure iOS 13 minimum for plugin compatibility
          sed -i '' "s/^# platform :ios.*/platform :ios, '13.0'/" ios/Podfile

      - name: 🏗️ Build iOS (No Codesign)
        # We run the standard flutter build first to let it handle asset bundling and plugin linking
        run: flutter build ios --release --no-codesign

      - name: 🔨 Package Unsigned IPA
        run: |
          # 1. Create the Payload directory
          mkdir -p Payload
          
          # 2. Find the Runner.app. 
          # Flutter build ios --no-codesign places it in build/ios/iphoneos/
          APP_PATH="build/ios/iphoneos/Runner.app"
          
          if [ -d "$APP_PATH" ]; then
            echo "✅ Found Runner.app at $APP_PATH"
            cp -r "$APP_PATH" Payload/
          else
            echo "❌ Runner.app not found at $APP_PATH. Searching..."
            # Fallback search if path differs
            SEARCH_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
            if [ -n "$SEARCH_PATH" ]; then
              cp -r "$SEARCH_PATH" Payload/
            else
              echo "❌ Failed to locate Runner.app"
              exit 1
            fi
          fi
          
          # 3. Zip into IPA
          zip -r PraiseTheLord_Unsigned.ipa Payload
          
      - name: 📤 Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: PraiseTheLord_Unsigned.ipa
          asset_name: PraiseTheLord_Unsigned.ipa
          tag: v1.0
          overwrite: true
          body: "Unsigned IPA Build for Praise-The-Lord. Use a service like SideStore, AltStore, or TrollStore to sign and install."
