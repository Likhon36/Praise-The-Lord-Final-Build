name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    # Removed the global working-directory because your files are in the root

    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🛠️ Update Pods
        run: pod repo update
        working-directory:

      - name: 🏗️ Build iOS Release (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: 📂 Create IPA Structure
        run: |
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      - name: 📤 Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          asset_name: PraiseTheLord.ipa
          tag: v1.0
          overwrite: true
          body: "IPA Build for Praise-The-Lord."
