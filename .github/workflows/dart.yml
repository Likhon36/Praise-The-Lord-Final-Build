name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🧹 Deep Clean
        run: |
          flutter clean
          rm -rf ios
          rm -rf .dart_tool
        
      - name: 🪄 Recreate iOS & Fix Podfile
        run: |
          # Use the exact name from your pubspec.yaml to avoid URI errors
          flutter create --project-name praise_the_lord_flutter --platforms=ios .
          sed -i '' "s/^# platform :ios.*/platform :ios, '13.0'/" ios/Podfile

      - name: 📦 Get Packages
        run: flutter pub get

      - name: 🏗️ Build App (Ignoring Signatures)
        # This compiles the code. Even if it says "Failed" at the end, 
        # as long as it compiles the DART code, we are good.
        run: flutter build ios --release --no-codesign || true

      - name: 🔨 Force Binary Generation
        # This is the heavy lifter that turns your code into an actual executable
        run: |
          cd ios
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM=""

      - name: 📂 Package Unsigned IPA
        run: |
          echo "Hunting for the generated Runner.app..."
          # Look specifically in the build folder where xcodebuild puts the result
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found in build/ios/iphoneos. Searching everywhere..."
            APP_PATH=$(find . -name "Runner.app" -type d | head -n 1)
          fi

          if [ ! -f "$APP_PATH/Runner" ]; then
            echo "❌ The actual binary 'Runner' is missing from the folder!"
            exit 1
          fi
          
          echo "✅ Found a fully compiled Runner.app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --keepParent Payload PraiseTheLord.ipa

      - name: 📤 Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: PraiseTheLord.ipa
          asset_name: PraiseTheLord.ipa
          tag: v1.0
          overwrite: true
          body: "Compiled Unsigned IPA"
