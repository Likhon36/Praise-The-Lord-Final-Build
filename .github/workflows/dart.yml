name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🧹 Re-generate iOS & Disable Signing
        run: |
          rm -rf ios
          flutter create --platforms=ios .
          
          # 1. Set iOS Deployment Target
          sed -i '' "s/^# platform :ios.*/platform :ios, '13.0'/" ios/Podfile
          
          # 2. Force Xcode to allow builds without a Team ID
          # This modifies the project file to disable signing requirements globally
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: 🏗️ Build iOS (No Codesign)
        # We add the --analyze-size flag sometimes helps skip certain validation checks
        run: flutter build ios --release --no-codesign

      - name: 🔨 Package Unsigned IPA
        run: |
          mkdir -p Payload
          # Standard location for the .app folder after a successful 'flutter build ios'
          APP_PATH="build/ios/iphoneos/Runner.app"
          
          if [ -d "$APP_PATH" ]; then
            echo "✅ Found Runner.app"
            cp -r "$APP_PATH" Payload/
            zip -r PraiseTheLord_Unsigned.ipa Payload
          else
            echo "❌ Runner.app not found. Build likely failed silently."
            exit 1
          fi
          
      - name: 📤 Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: PraiseTheLord_Unsigned.ipa
          asset_name: PraiseTheLord_Unsigned.ipa
          tag: v1.0
          overwrite: true
          body: "Unsigned IPA Build. Note: This requires manual signing (AltStore/Sideloadly) to install."
