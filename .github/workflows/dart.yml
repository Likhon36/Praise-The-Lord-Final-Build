name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🧹 Clean up
        run: rm -rf ios
        
      - name: 🪄 Generate iOS project
        run: flutter create --platforms=ios .

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🏗️ Build App (Bypass Signing Error)
        # We tell GitHub to keep moving even when Xcode inevitably fails the signing check
        run: flutter build ios --release --no-codesign || true

      - name: 📂 Package IPA
        run: |
          echo "Hunting for the generated Runner.app..."
          # Find the Runner.app directory wherever Xcode left it
          APP_PATH=$(find . -name "Runner.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app was not found!"
            exit 1
          fi
          
          echo "✅ Found Runner.app at: $APP_PATH"
          mkdir -p Payload
          
          # The '-a' flag preserves all symlinks, ownership, and permissions
          cp -a "$APP_PATH" Payload/
          
          # The '-y' flag tells zip to keep symlinks intact instead of breaking them
          zip -ry PraiseTheLord.ipa Payload

      - name: 📤 Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: PraiseTheLord.ipa
          asset_name: PraiseTheLord.ipa
          tag: v1.0
          overwrite: true
          body: "Unsigned IPA Build for Praise-The-Lord."
